services:
  cassandra:
    image: cassandra:4.1
    container_name: distcomp-cassandra
    ports:
      - "9042:9042"
    volumes:
      - ./discussion/init.cql:/docker-entrypoint-initdb.d/init.cql
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - distcomp-net

  postgres:
    image: postgres:15
    container_name: distcomp-postgres
    environment:
      POSTGRES_DB: distcomp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./publisher/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - distcomp-net

  publisher:
    build: ./publisher
    container_name: distcomp-publisher
    ports:
      - "24110:24110"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: distcomp
      DB_USER: postgres
      DB_PASS: postgres
      DISCUSSION_URL: http://discussion:24130
    networks:
      - distcomp-net

  discussion:
    build: ./discussion
    container_name: distcomp-discussion
    ports:
      - "24130:24130"
    depends_on:
      cassandra:
        condition: service_healthy
    environment:
      CASSANDRA_HOST: cassandra
      CASSANDRA_PORT: 9042
      CASSANDRA_KEYSPACE: distcomp
    networks:
      - distcomp-net

networks:
  distcomp-net:
    driver: bridge
    name: distcomp-net