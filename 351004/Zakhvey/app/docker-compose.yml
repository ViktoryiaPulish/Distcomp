services:
  postgres:
    image: postgres:15-alpine
    container_name: distcomp_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: distcomp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  liquibase:
    image: liquibase/liquibase:4.24.0
    container_name: distcomp_liquibase
    depends_on:
      - postgres
    volumes:
      - ./liquibase:/liquibase/changelog
    command: >
      --url=jdbc:postgresql://postgres:5432/distcomp 
      --username=postgres
      --password=postgres
      --changeLogFile=db.changelog-master.xml
      update

volumes:
  pgdata: